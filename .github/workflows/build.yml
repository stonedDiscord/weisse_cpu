name: Build

on:
  push:
    paths: ['testrom/*.c']
  pull_request:
    paths: ['testrom/*.c']

jobs:
  build:
    runs-on: ubuntu-latest
    container: z88dk/z88dk

    steps:
    - uses: actions/checkout@v6

    - name: Build for 4040
      working-directory: testrom
      run: |
        ./build.sh -DBOARD4040
        mv a.rom a4040.rom

    - name: Build for 4087
      working-directory: testrom
      run: |
        ./build.sh -DBOARD4087
        mv a.rom a4087.rom

    - name: Build for 4109
      working-directory: testrom
      run: |
        ./build.sh -DBOARD4109
        mv a.rom a4109.rom

    - name: Upload ROM artifact
      uses: actions/upload-artifact@v6
      with:
        name: testroms
        path: testrom/*.rom
